name: Deploy Dashboard Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/dashboard/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-dashboard-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dashboard-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dashboard:
    name: Build and deploy dashboard to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm dashboard:build

      - name: Write dashboard build marker
        run: |
          cat > apps/dashboard/dist/build-info.json <<EOF
          {
            "app": "ai-curation-dashboard",
            "source": "github-actions",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF_NAME}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Deploy dashboard to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy apps/dashboard/dist --project-name ai-curation-dashboard
