name = "ai-curation-publisher-agent"
main = "apps/worker-api/src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

[vars]
ENVIRONMENT = "local"
LOG_LEVEL = "info"
PROVIDERS_MODE = "mock"
SCHEDULER_ENABLED = "false"
SCHEDULER_DRY_RUN = "true"
SCHEDULER_ALLOW_REAL_PROVIDERS = "false"
SCHEDULER_ALLOW_PUBLISHING = "false"
SCHEDULER_MAX_SOURCES_PER_RUN = "1"
SCHEDULER_MAX_ITEMS_PER_RUN = "2"
MAX_AI_ITEMS_PER_RUN = "0"
MAX_PROVIDER_ITEMS_PER_RUN = "5"
MAX_PUBLISH_ITEMS_PER_RUN = "0"
TELEGRAM_REAL_REVIEW_ENABLED = "false"
TELEGRAM_FINAL_PUBLISH_ENABLED = "false"
WORDPRESS_REAL_DRY_RUN_ENABLED = "false"
WORDPRESS_DEFAULT_STATUS = "draft"

# Local/mock-safe D1 binding. Keep this placeholder for local development.
# Production uses [env.production] below.
[[d1_databases]]
binding = "DB"
database_name = "curator_mvp"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "packages/db/migrations"

[env.production]
name = "ai-curation-publisher-agent"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
PROVIDERS_MODE = "mock"
SCHEDULER_ENABLED = "false"
SCHEDULER_DRY_RUN = "true"
SCHEDULER_ALLOW_REAL_PROVIDERS = "false"
SCHEDULER_ALLOW_PUBLISHING = "false"
SCHEDULER_MAX_SOURCES_PER_RUN = "1"
SCHEDULER_MAX_ITEMS_PER_RUN = "2"
MAX_AI_ITEMS_PER_RUN = "0"
MAX_PROVIDER_ITEMS_PER_RUN = "5"
MAX_PUBLISH_ITEMS_PER_RUN = "0"
TELEGRAM_REAL_REVIEW_ENABLED = "false"
TELEGRAM_FINAL_PUBLISH_ENABLED = "false"
WORDPRESS_REAL_DRY_RUN_ENABLED = "false"
WORDPRESS_DEFAULT_STATUS = "draft"

[[env.production.d1_databases]]
binding = "DB"
database_name = "curator_mvp"
database_id = "b4002f23-322f-4557-9d98-eedafa82558c"
migrations_dir = "packages/db/migrations"

# Optional future bindings, intentionally commented until real Cloudflare resources exist.
# [[queues.producers]]
# binding = "PUBLISH_QUEUE"
# queue = "ai-curation-publisher-agent-publish"
#
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "ai-curation-publisher-agent-media"

[triggers]
# Mock-safe scheduled poller. It uses mock providers by default and does not call external APIs.
crons = ["*/30 * * * *"]
